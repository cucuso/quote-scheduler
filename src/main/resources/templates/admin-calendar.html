<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moving Calendar - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B1120;
            --surface: #151F32;
            --surface-raised: #1E2B42;
            --border: rgba(255,255,255,0.07);
            --border-solid: #2A3A52;
            --amber: #F59E0B;
            --amber-dark: #D97706;
            --amber-glow: rgba(245,158,11,0.12);
            --text: #E8EEF8;
            --text-muted: #7D92AE;
            --text-dim: #3D506A;
            --col-new: #818CF8;
            --col-quoted: #FBBF24;
            --col-confirmed: #34D399;
            --col-completed: #38BDF8;
            --col-cancelled: #F87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        .navbar {
            background: var(--surface);
            padding: 15px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            font-family: 'Archivo Black', sans-serif;
            color: var(--text);
            font-size: 19px;
            letter-spacing: -0.02em;
        }

        .navbar-right { display: flex; align-items: center; gap: 16px; }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.15s ease;
        }

        .btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: var(--amber); color: #0B1120; }
        .btn-danger { background: #EF4444; color: white; }
        .btn-success { background: #10B981; color: white; }
        .btn-warning { background: var(--amber); color: #0B1120; }
        .btn-secondary { background: var(--surface-raised); color: var(--text-muted); border: 1px solid var(--border-solid); }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-whatsapp:hover { background: #128C7E; }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* Stats */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--surface);
            padding: 20px 20px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            border-radius: 0 2px 2px 0;
        }

        .stat-card.new::after { background: var(--col-new); }
        .stat-card.quoted::after { background: var(--col-quoted); }
        .stat-card.confirmed::after { background: var(--col-confirmed); }
        .stat-card.completed::after { background: var(--col-completed); }
        .stat-card.total::after { background: var(--amber); }

        .stat-card h3 {
            color: var(--text-muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-card .number { font-size: 28px; font-weight: 700; line-height: 1; }
        .stat-card.new .number { color: var(--col-new); }
        .stat-card.quoted .number { color: var(--col-quoted); }
        .stat-card.confirmed .number { color: var(--col-confirmed); }
        .stat-card.completed .number { color: var(--col-completed); }
        .stat-card.total .number { color: var(--amber); }

        /* Calendar Header */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            background: var(--surface);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }

        .month-nav { display: flex; align-items: center; gap: 12px; }

        .month-nav button {
            padding: 7px 14px;
            background: var(--surface-raised);
            color: var(--text-muted);
            border: 1px solid var(--border-solid);
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        .month-nav button:hover {
            background: var(--amber-glow);
            border-color: var(--amber);
            color: var(--amber);
        }

        .month-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: var(--text);
            min-width: 200px;
            text-align: center;
            letter-spacing: -0.02em;
        }

        .filter-group { display: flex; gap: 10px; align-items: center; }

        .filter-group select {
            padding: 8px 14px;
            background: var(--surface-raised);
            border: 1px solid var(--border-solid);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text);
            outline: none;
            cursor: pointer;
            transition: border-color 0.15s;
            font-family: inherit;
        }

        .filter-group select:focus { border-color: var(--amber); }

        /* Calendar Grid */
        .calendar-grid {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--surface-raised);
            border-bottom: 1px solid var(--border);
        }

        .weekday {
            padding: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .days { display: grid; grid-template-columns: repeat(7, 1fr); }

        .day {
            min-height: 100px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 7px;
            cursor: pointer;
            transition: background 0.15s ease;
            font-size: 13px;
        }

        .day:nth-child(7n) { border-right: none; }
        .day:hover { background: rgba(255,255,255,0.025); }
        .day.other-month { background: rgba(0,0,0,0.18); }
        .day.other-month .day-number { color: var(--text-dim); }
        .day.today { background: var(--amber-glow); }

        .day-number {
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-size: 13px;
        }

        .day.today .day-number {
            background: var(--amber);
            color: #0B1120;
            width: 24px; height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }

        /* Booking pills */
        .booking-pill {
            padding: 3px 7px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .booking-pill:hover { opacity: 0.8; }
        .booking-pill.status-NEW { background: rgba(129,140,248,0.18); color: var(--col-new); border-left: 2px solid var(--col-new); }
        .booking-pill.status-QUOTED { background: rgba(251,191,36,0.18); color: var(--col-quoted); border-left: 2px solid var(--col-quoted); }
        .booking-pill.status-CONFIRMED { background: rgba(52,211,153,0.18); color: var(--col-confirmed); border-left: 2px solid var(--col-confirmed); }
        .booking-pill.status-COMPLETED { background: rgba(56,189,248,0.18); color: var(--col-completed); border-left: 2px solid var(--col-completed); }
        .booking-pill.status-CANCELLED { background: rgba(248,113,113,0.13); color: var(--col-cancelled); border-left: 2px solid var(--col-cancelled); text-decoration: line-through; opacity: 0.65; }
        .more-bookings { font-size: 10px; color: var(--amber); font-weight: 700; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border-solid);
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        @keyframes modalIn {
            from { transform: translateY(28px) scale(0.97); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 10;
        }

        .modal-header h2 {
            color: var(--text);
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .modal-close {
            background: var(--surface-raised);
            border: 1px solid var(--border-solid);
            font-size: 18px;
            cursor: pointer;
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            line-height: 1;
        }

        .modal-close:hover { color: var(--text); border-color: var(--amber); }
        .modal-body { padding: 20px 24px; }

        /* Booking Detail Card */
        .detail-section { margin-bottom: 20px; }

        .detail-section h3 {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .detail-item {
            background: var(--bg);
            padding: 11px 13px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .detail-item label {
            font-size: 9px;
            color: var(--text-dim);
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
        }

        .detail-item span { font-size: 14px; color: var(--text); font-weight: 500; }
        .detail-item.full { grid-column: 1 / -1; }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-badge.NEW { background: rgba(129,140,248,0.15); color: var(--col-new); }
        .status-badge.QUOTED { background: rgba(251,191,36,0.15); color: var(--col-quoted); }
        .status-badge.CONFIRMED { background: rgba(52,211,153,0.15); color: var(--col-confirmed); }
        .status-badge.COMPLETED { background: rgba(56,189,248,0.15); color: var(--col-completed); }
        .status-badge.CANCELLED { background: rgba(248,113,113,0.15); color: var(--col-cancelled); }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        /* Form elements in modal */
        .form-group { margin-bottom: 15px; }

        .form-group label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border-solid);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color 0.15s;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--amber);
            box-shadow: 0 0 0 3px var(--amber-glow);
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        @media (max-width: 768px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .calendar-header { flex-direction: column; }
            .detail-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>Moving Calendar</h1>
        <div class="navbar-right">
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card new">
                <h3>New Requests</h3>
                <div class="number" id="newCount">0</div>
            </div>
            <div class="stat-card quoted">
                <h3>Quoted</h3>
                <div class="number" id="quotedCount">0</div>
            </div>
            <div class="stat-card confirmed">
                <h3>Confirmed</h3>
                <div class="number" id="confirmedCount">0</div>
            </div>
            <div class="stat-card completed">
                <h3>Completed</h3>
                <div class="number" id="completedCount">0</div>
            </div>
            <div class="stat-card total">
                <h3>This Month</h3>
                <div class="number" id="totalCount">0</div>
            </div>
        </div>
        
        <!-- Calendar Header -->
        <div class="calendar-header">
            <div class="month-nav">
                <button onclick="prevMonth()">←</button>
                <div class="month-title" id="monthTitle">January 2026</div>
                <button onclick="nextMonth()">→</button>
            </div>
            <div class="filter-group">
                <select id="statusFilter" onchange="renderCalendar()">
                    <option value="">All Statuses</option>
                    <option value="NEW">New</option>
                    <option value="QUOTED">Quoted</option>
                    <option value="CONFIRMED">Confirmed</option>
                    <option value="COMPLETED">Completed</option>
                    <option value="CANCELLED">Cancelled</option>
                </select>
                <button class="btn btn-secondary" onclick="loadBookings()">Refresh</button>
            </div>
        </div>
        
        <!-- Calendar Grid -->
        <div class="calendar-grid" id="calendarGrid">
            <div class="weekdays">
                <div class="weekday">Sun</div>
                <div class="weekday">Mon</div>
                <div class="weekday">Tue</div>
                <div class="weekday">Wed</div>
                <div class="weekday">Thu</div>
                <div class="weekday">Fri</div>
                <div class="weekday">Sat</div>
            </div>
            <div class="days" id="calendarDays"></div>
        </div>
    </div>
    
    <!-- Booking Detail/Edit Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Booking Details</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let bookings = [];
        let currentBooking = null;
        
        if (!localStorage.getItem('authToken')) {
            window.location.href = '/login';
        }
        
        function logout() {
            localStorage.removeItem('authToken');
            window.location.href = '/login';
        }
        
        async function loadBookings() {
            try {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                
                const from = firstDay.toISOString().split('T')[0];
                const to = lastDay.toISOString().split('T')[0];
                
                // No company filter - get ALL bookings
                const response = await fetch(`/api/bookings?from=${from}&to=${to}`);
                bookings = await response.json();
                
                renderCalendar();
                updateStats();
            } catch (error) {
                console.error('Error loading bookings:', error);
            }
        }
        
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const statusFilter = document.getElementById('statusFilter').value;
            
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                              'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('monthTitle').textContent = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDayOfWeek = firstDay.getDay();
            const daysInMonth = lastDay.getDate();
            
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            
            // Filter bookings
            let filteredBookings = bookings;
            if (statusFilter) {
                filteredBookings = bookings.filter(b => b.status === statusFilter);
            }
            
            let html = '';
            
            // Previous month days
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startDayOfWeek - 1; i >= 0; i--) {
                const day = prevMonthLastDay - i;
                html += `<div class="day other-month"><div class="day-number">${day}</div></div>`;
            }
            
            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayBookings = filteredBookings.filter(b => {
                    const movingDate = b.confirmedDate || b.tentativeDate;
                    return movingDate === dateStr;
                });
                const isToday = dateStr === todayStr;
                
                html += `<div class="day ${isToday ? 'today' : ''}" onclick="showDayBookings('${dateStr}')">`;
                html += `<div class="day-number">${day}</div>`;
                
                dayBookings.slice(0, 3).forEach(booking => {
                    html += `<div class="booking-pill status-${booking.status}" onclick="event.stopPropagation(); showBookingDetail(${booking.id})">${booking.fullName}</div>`;
                });
                
                if (dayBookings.length > 3) {
                    html += `<div class="more-bookings">+${dayBookings.length - 3} more</div>`;
                }
                
                html += '</div>';
            }
            
            // Next month days
            const totalCells = startDayOfWeek + daysInMonth;
            const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remainingCells; i++) {
                html += `<div class="day other-month"><div class="day-number">${i}</div></div>`;
            }
            
            document.getElementById('calendarDays').innerHTML = html;
        }
        
        function updateStats() {
            const counts = { NEW: 0, QUOTED: 0, CONFIRMED: 0, COMPLETED: 0, CANCELLED: 0 };
            bookings.forEach(b => { if (counts.hasOwnProperty(b.status)) counts[b.status]++; });
            
            document.getElementById('newCount').textContent = counts.NEW;
            document.getElementById('quotedCount').textContent = counts.QUOTED;
            document.getElementById('confirmedCount').textContent = counts.CONFIRMED;
            document.getElementById('completedCount').textContent = counts.COMPLETED;
            document.getElementById('totalCount').textContent = bookings.length;
        }
        
        function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); loadBookings(); }
        function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); loadBookings(); }
        
        async function showBookingDetail(id) {
            try {
                const response = await fetch(`/api/bookings/${id}`);
                currentBooking = await response.json();
                renderBookingModal();
                document.getElementById('bookingModal').classList.add('show');
            } catch (error) {
                alert('Error loading booking details');
            }
        }
        
        function showDayBookings(dateStr) {
            const dayBookings = bookings.filter(b => {
                const movingDate = b.confirmedDate || b.tentativeDate;
                return movingDate === dateStr;
            });
            
            if (dayBookings.length === 1) {
                showBookingDetail(dayBookings[0].id);
            } else if (dayBookings.length > 1) {
                // Show list of bookings for that day
                const date = new Date(dateStr + 'T00:00:00');
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                
                let html = `<h3 style="margin-bottom:15px;">${date.toLocaleDateString('en-US', options)}</h3>`;
                dayBookings.forEach(b => {
                    html += `
                        <div class="detail-item" style="cursor:pointer;margin-bottom:10px;" onclick="showBookingDetail(${b.id})">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div>
                                    <strong>${b.fullName}</strong><br>
                                    <small>${b.confirmedTime || b.tentativeTime || 'Time TBD'} - ${b.pickupAddress}</small>
                                </div>
                                <span class="status-badge ${b.status}">${b.status}</span>
                            </div>
                        </div>
                    `;
                });
                
                document.getElementById('modalTitle').textContent = 'Day Schedule';
                document.getElementById('modalBody').innerHTML = html;
                document.getElementById('bookingModal').classList.add('show');
            }
        }
        
        function renderBookingModal() {
            const b = currentBooking;
            const movingDate = b.confirmedDate || b.tentativeDate;
            const movingTime = b.confirmedTime || b.tentativeTime;
            
            let itemsHtml = '';
            if (b.items) {
                try {
                    const items = JSON.parse(b.items);
                    itemsHtml = Object.entries(items).map(([k,v]) => `${formatItemName(k)}: ${v}`).join(', ');
                } catch(e) {}
            }
            
            const html = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                    <div>
                        <h3 style="margin:0;font-size:20px;">${b.fullName}</h3>
                        <a href="tel:${b.phoneNumber}" style="color:#667eea;">${b.phoneNumber}</a>
                    </div>
                    <span class="status-badge ${b.status}">${b.status}</span>
                </div>
                
                <div class="detail-section">
                    <h3>📅 Moving Details</h3>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <label>Date</label>
                            <span>${formatDate(movingDate)}</span>
                            ${b.confirmedDate ? '<small style="color:#28a745;"> (Confirmed)</small>' : '<small style="color:#ffc107;"> (Tentative)</small>'}
                        </div>
                        <div class="detail-item">
                            <label>Time</label>
                            <span>${movingTime || 'TBD'}</span>
                        </div>
                        <div class="detail-item">
                            <label>Quote Amount</label>
                            <span>${b.quoteAmount ? '$' + b.quoteAmount.toFixed(2) : 'Not quoted yet'}</span>
                        </div>
                        <div class="detail-item">
                            <label>Source</label>
                            <span>${b.adSource}</span>
                        </div>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>📦 Pickup</h3>
                    <div class="detail-grid">
                        <div class="detail-item full">
                            <label>Address</label>
                            <span>${b.pickupAddress}, ${b.pickupZipcode}</span>
                        </div>
                        <div class="detail-item">
                            <label>Access Type</label>
                            <span>${b.pickupAccess}</span>
                        </div>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>📍 Delivery</h3>
                    <div class="detail-grid">
                        <div class="detail-item full">
                            <label>Address</label>
                            <span>${b.deliveryAddress}, ${b.deliveryZipcode}</span>
                        </div>
                        <div class="detail-item">
                            <label>Access Type</label>
                            <span>${b.deliveryAccess}</span>
                        </div>
                    </div>
                </div>
                
                ${itemsHtml ? `
                <div class="detail-section">
                    <h3>🪑 Items</h3>
                    <div class="detail-item full">
                        <span style="font-size:13px;">${itemsHtml}</span>
                    </div>
                </div>
                ` : ''}
                
                ${b.additionalItems ? `
                <div class="detail-section">
                    <h3>📝 Additional Notes</h3>
                    <div class="detail-item full">
                        <span>${b.additionalItems}</span>
                    </div>
                </div>
                ` : ''}
                
                ${b.internalNotes ? `
                <div class="detail-section">
                    <h3>🔒 Internal Notes</h3>
                    <div class="detail-item full" style="background:#fff3cd;">
                        <span>${b.internalNotes}</span>
                    </div>
                </div>
                ` : ''}
                
                <div class="action-buttons">
                    <a href="https://wa.me/${b.phoneNumber.replace(/\D/g,'')}" target="_blank" class="btn btn-whatsapp">💬 WhatsApp</a>
                    <a href="tel:${b.phoneNumber}" class="btn btn-secondary">📞 Call</a>
                    <button class="btn btn-primary" onclick="showEditModal()">✏️ Edit</button>
                    ${b.status === 'NEW' ? `<button class="btn btn-warning" onclick="showQuoteModal()">💰 Set Quote</button>` : ''}
                    ${b.status === 'QUOTED' ? `<button class="btn btn-success" onclick="showConfirmModal()">✓ Confirm Booking</button>` : ''}
                    ${b.status === 'CONFIRMED' ? `<button class="btn btn-success" onclick="markCompleted()">✓ Mark Completed</button>` : ''}
                    ${b.status !== 'CANCELLED' && b.status !== 'COMPLETED' ? `<button class="btn btn-danger" onclick="cancelBooking()">✗ Cancel</button>` : ''}
                </div>
            `;
            
            document.getElementById('modalTitle').textContent = 'Booking #' + b.id;
            document.getElementById('modalBody').innerHTML = html;
        }
        
        function showQuoteModal() {
            const b = currentBooking;
            const html = `
                <form onsubmit="submitQuote(event)">
                    <div class="form-group">
                        <label>Quote Amount ($)</label>
                        <input type="number" id="quoteAmount" step="0.01" min="0" required placeholder="e.g., 450.00" value="${b.quoteAmount || ''}">
                    </div>
                    <div class="form-group">
                        <label>Internal Notes</label>
                        <textarea id="quoteNotes" rows="3" placeholder="Notes about this quote...">${b.internalNotes || ''}</textarea>
                    </div>
                    <div class="action-buttons">
                        <button type="button" class="btn btn-secondary" onclick="renderBookingModal()">Cancel</button>
                        <button type="submit" class="btn btn-warning">Set Quote</button>
                    </div>
                </form>
            `;
            document.getElementById('modalTitle').textContent = 'Set Quote';
            document.getElementById('modalBody').innerHTML = html;
        }
        
        async function submitQuote(e) {
            e.preventDefault();
            const quoteAmount = document.getElementById('quoteAmount').value;
            const notes = document.getElementById('quoteNotes').value;
            
            try {
                await fetch(`/api/bookings/${currentBooking.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quoteAmount: parseFloat(quoteAmount), internalNotes: notes, status: 'QUOTED' })
                });
                await showBookingDetail(currentBooking.id);
                loadBookings();
            } catch (error) {
                alert('Error setting quote');
            }
        }
        
        function showConfirmModal() {
            const b = currentBooking;
            const html = `
                <form onsubmit="submitConfirm(event)">
                    <p style="margin-bottom:15px;color:#666;">Confirm the final moving date and time:</p>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Confirmed Date</label>
                            <input type="date" id="confirmDate" required value="${b.confirmedDate || b.tentativeDate}">
                        </div>
                        <div class="form-group">
                            <label>Confirmed Time</label>
                            <input type="time" id="confirmTime" value="${b.confirmedTime || b.tentativeTime || ''}">
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button type="button" class="btn btn-secondary" onclick="renderBookingModal()">Cancel</button>
                        <button type="submit" class="btn btn-success">Confirm Booking</button>
                    </div>
                </form>
            `;
            document.getElementById('modalTitle').textContent = 'Confirm Booking';
            document.getElementById('modalBody').innerHTML = html;
        }
        
        async function submitConfirm(e) {
            e.preventDefault();
            const confirmedDate = document.getElementById('confirmDate').value;
            const confirmedTime = document.getElementById('confirmTime').value;
            
            try {
                await fetch(`/api/bookings/${currentBooking.id}/confirm`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ confirmedDate, confirmedTime })
                });
                await showBookingDetail(currentBooking.id);
                loadBookings();
            } catch (error) {
                alert('Error confirming booking');
            }
        }
        
        function showEditModal() {
            const b = currentBooking;
            const html = `
                <form onsubmit="submitEdit(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="editName" required value="${b.fullName}">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" id="editPhone" required value="${b.phoneNumber}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Moving Date</label>
                            <input type="date" id="editDate" required value="${b.confirmedDate || b.tentativeDate}">
                        </div>
                        <div class="form-group">
                            <label>Moving Time</label>
                            <input type="time" id="editTime" value="${b.confirmedTime || b.tentativeTime || ''}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Pickup Address</label>
                        <input type="text" id="editPickup" required value="${b.pickupAddress}">
                    </div>
                    <div class="form-group">
                        <label>Delivery Address</label>
                        <input type="text" id="editDelivery" required value="${b.deliveryAddress}">
                    </div>
                    <div class="form-group">
                        <label>Quote Amount ($)</label>
                        <input type="number" id="editQuote" step="0.01" min="0" value="${b.quoteAmount || ''}">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="editStatus">
                            <option value="NEW" ${b.status === 'NEW' ? 'selected' : ''}>New</option>
                            <option value="QUOTED" ${b.status === 'QUOTED' ? 'selected' : ''}>Quoted</option>
                            <option value="CONFIRMED" ${b.status === 'CONFIRMED' ? 'selected' : ''}>Confirmed</option>
                            <option value="COMPLETED" ${b.status === 'COMPLETED' ? 'selected' : ''}>Completed</option>
                            <option value="CANCELLED" ${b.status === 'CANCELLED' ? 'selected' : ''}>Cancelled</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Internal Notes</label>
                        <textarea id="editNotes" rows="3">${b.internalNotes || ''}</textarea>
                    </div>
                    <div class="action-buttons">
                        <button type="button" class="btn btn-secondary" onclick="renderBookingModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <button type="button" class="btn btn-danger" onclick="deleteBooking()">Delete</button>
                    </div>
                </form>
            `;
            document.getElementById('modalTitle').textContent = 'Edit Booking';
            document.getElementById('modalBody').innerHTML = html;
        }
        
        async function submitEdit(e) {
            e.preventDefault();
            const data = {
                fullName: document.getElementById('editName').value,
                phoneNumber: document.getElementById('editPhone').value,
                confirmedDate: document.getElementById('editDate').value,
                confirmedTime: document.getElementById('editTime').value,
                pickupAddress: document.getElementById('editPickup').value,
                deliveryAddress: document.getElementById('editDelivery').value,
                quoteAmount: document.getElementById('editQuote').value || null,
                status: document.getElementById('editStatus').value,
                internalNotes: document.getElementById('editNotes').value
            };
            
            try {
                await fetch(`/api/bookings/${currentBooking.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                await showBookingDetail(currentBooking.id);
                loadBookings();
            } catch (error) {
                alert('Error updating booking');
            }
        }
        
        async function markCompleted() {
            if (!confirm('Mark this booking as completed?')) return;
            try {
                await fetch(`/api/bookings/${currentBooking.id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'COMPLETED' })
                });
                await showBookingDetail(currentBooking.id);
                loadBookings();
            } catch (error) {
                alert('Error updating status');
            }
        }
        
        async function cancelBooking() {
            if (!confirm('Are you sure you want to cancel this booking?')) return;
            try {
                await fetch(`/api/bookings/${currentBooking.id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'CANCELLED' })
                });
                await showBookingDetail(currentBooking.id);
                loadBookings();
            } catch (error) {
                alert('Error cancelling booking');
            }
        }
        
        async function deleteBooking() {
            if (!confirm('Are you sure you want to DELETE this booking? This cannot be undone.')) return;
            try {
                await fetch(`/api/bookings/${currentBooking.id}`, { method: 'DELETE' });
                closeModal();
                loadBookings();
            } catch (error) {
                alert('Error deleting booking');
            }
        }
        
        function closeModal() {
            document.getElementById('bookingModal').classList.remove('show');
            currentBooking = null;
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        }
        
        function formatItemName(key) {
            return key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }
        
        document.getElementById('bookingModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('bookingModal')) closeModal();
        });
        
        loadBookings();
    </script>
</body>
</html>
