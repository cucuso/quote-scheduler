services:
  db:
    image: postgres:16-alpine
    container_name: scheduler-db
    environment:
      POSTGRES_DB: scheduler
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
    container_name: scheduler-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: jdbc:postgresql://db:5432/scheduler
      PGUSER: scheduler
      PGPASSWORD: scheduler
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      COMPANY_NAME: MyMovingCompany
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
